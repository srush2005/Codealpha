<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translator </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="bg-shape shape-left"></div>
<div class="bg-shape shape-right"></div>

<div class="main-wrapper">
    <div class="header">
        <h1>Language <span>Translator</span></h1>
        <div class="status-dot"></div>
    </div>

    <div class="translator-card">
        <div class="lang-row">
            <select id="sourceLang"></select>
            <div id="swapBtn" class="swap-circle"><i class="fa-solid fa-repeat"></i></div>
            <select id="targetLang"></select>
        </div>

        <div class="grid-layout">
            <div class="text-area-container">
                <div class="area-label">Source Text</div>
                <textarea id="inputText" placeholder="Type something..."></textarea>
                <div class="tools">
                    <i id="micIcon" class="fa-solid fa-microphone" onclick="startVoice()"></i>
                    <i class="fa-solid fa-volume-high" onclick="speakText('inputText')"></i>
                    <span id="count">0 / 2000</span>
                </div>
            </div>

            <div class="text-area-container result-area">
                <div class="area-label">Translation</div>
                <textarea id="outputText" readonly placeholder="Result..."></textarea>
                <div class="tools">
                    <i class="fa-solid fa-volume-high" onclick="speakText('outputText')"></i>
                    <i class="fa-regular fa-copy" onclick="copyText()"></i>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-main" onclick="translateText()">Process Translation</button>
            <button class="btn-clear" onclick="clearInput()">Reset</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
</body>
</html>
